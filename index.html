<html><head><title>Martinsburg Granite Company</title></head><body>
<style>
    /* Reset and Base Styles */
    body {
        margin: 0;
        padding: 10px;
        text-align: center; /* This handles the alignment for text and inline elements */
    }

    /* Target all images for responsiveness */
    img {
        display: block;
        margin: 1px auto; /* Centers the block-level images */
        width: 100%;       /* Default: 100% width for phones */
        height: auto;
        image-rendering: pixelated;
        -ms-interpolation-mode: nearest-neighbor;
    }

    /* Desktop Overrides (Screens wider than 768px) */
    @media (min-width: 1024px) {
        img {
            width: 40%; 
        }
        /* Keep the counter small on desktop so it doesn't look huge */
        .counter-img {
            width: 30% !important;
        }
    }

    /* Force the counter to center and handle its size */
    .counter-wrapper {
        display: flex;
        justify-content: center;
        
        margin-top: 30px;
    }

    .counter-img {
        display: inline-block; /* Allow it to be its natural size or 100% */
        max-width: 100%;
    }
</style>

<body>
